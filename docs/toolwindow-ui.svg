<svg xmlns="http://www.w3.org/2000/svg" width="440" height="760" viewBox="0 0 440 760" font-family="'JetBrains Mono','Menlo','Consolas',monospace">
  <!-- 背景（IDE 深色主题） -->
  <rect x="0" y="0" width="440" height="760" rx="14" fill="#1e1e2e"/>
  <rect x="6" y="6" width="428" height="748" rx="12" fill="none" stroke="#3a3a4a" stroke-width="1"/>

  <!-- 标题栏 -->
  <rect x="6" y="6" width="428" height="40" rx="12" fill="#262635"/>
  <rect x="6" y="34" width="428" height="12" fill="#262635"/>
  <circle cx="26" cy="26" r="6" fill="#22d3ee"/>
  <text x="42" y="31" fill="#e5e7eb" font-size="15" font-weight="bold">码字计时器</text>
  <text x="412" y="31" fill="#7c7c93" font-size="12" text-anchor="end">⚙</text>

  <!-- 顶部统计卡片（2 列 x 3 行） -->
  <!-- 行1 -->
  <g>
    <rect x="18" y="58" width="196" height="60" rx="10" fill="#2a2a3a" stroke="#34344a"/>
    <text x="30" y="80" fill="#9aa0b4" font-size="11">今日码字</text>
    <text x="30" y="104" fill="#22d3ee" font-size="20" font-weight="bold">1,234</text>
    <rect x="226" y="58" width="196" height="60" rx="10" fill="#2a2a3a" stroke="#34344a"/>
    <text x="238" y="80" fill="#9aa0b4" font-size="11">累计码字</text>
    <text x="238" y="104" fill="#a78bfa" font-size="20" font-weight="bold">56,789</text>
  </g>
  <!-- 行2 -->
  <g>
    <rect x="18" y="126" width="196" height="60" rx="10" fill="#2a2a3a" stroke="#34344a"/>
    <text x="30" y="148" fill="#9aa0b4" font-size="11">今日时长</text>
    <text x="30" y="172" fill="#34d399" font-size="20" font-weight="bold">01:23</text>
    <rect x="226" y="126" width="196" height="60" rx="10" fill="#2a2a3a" stroke="#34344a"/>
    <text x="238" y="148" fill="#9aa0b4" font-size="11">手速</text>
    <text x="238" y="172" fill="#fbbf24" font-size="20" font-weight="bold">62 <tspan font-size="11" fill="#9aa0b4">字/分</tspan></text>
  </g>
  <!-- 行3 -->
  <g>
    <rect x="18" y="194" width="196" height="60" rx="10" fill="#2a2a3a" stroke="#34344a"/>
    <text x="30" y="216" fill="#9aa0b4" font-size="11">每日目标</text>
    <text x="30" y="240" fill="#34d399" font-size="18" font-weight="bold">1234/1000 ✓</text>
    <!-- 进度条 -->
    <rect x="120" y="228" width="80" height="8" rx="4" fill="#34344a"/>
    <rect x="120" y="228" width="80" height="8" rx="4" fill="#34d399"/>
    <rect x="226" y="194" width="196" height="60" rx="10" fill="#2a2a3a" stroke="#34344a"/>
    <text x="238" y="216" fill="#9aa0b4" font-size="11">状态</text>
    <text x="238" y="240" fill="#f472b6" font-size="13">💃 手指跳踢踏舞</text>
  </g>

  <!-- 中央：码字舞台 -->
  <rect x="18" y="268" width="404" height="300" rx="12" fill="#171722" stroke="#34344a"/>
  <text x="32" y="290" fill="#7c7c93" font-size="12">码字舞台</text>
  <!-- 上飘光点粒子 -->
  <g font-size="15" font-weight="bold" text-anchor="middle">
    <circle cx="80" cy="330" r="16" fill="#22d3ee" opacity="0.85"/>
    <text x="80" y="336" fill="#06222a">码</text>
    <circle cx="150" cy="300" r="14" fill="#f472b6" opacity="0.8"/>
    <text x="150" y="306" fill="#2a0a1c">字</text>
    <circle cx="220" cy="345" r="15" fill="#a78bfa" opacity="0.85"/>
    <text x="220" y="351" fill="#1a0f33">C</text>
    <circle cx="300" cy="310" r="13" fill="#fbbf24" opacity="0.8"/>
    <text x="300" y="316" fill="#33260a">o</text>
    <circle cx="360" cy="340" r="14" fill="#34d399" opacity="0.8"/>
    <text x="360" y="346" fill="#06291d">d</text>
    <circle cx="120" cy="380" r="12" fill="#60a5fa" opacity="0.7"/>
    <text x="120" y="386" fill="#06223a">e</text>
    <circle cx="260" cy="390" r="12" fill="#f472b6" opacity="0.7"/>
    <text x="260" y="396" fill="#2a0a1c">r</text>
  </g>
  <!-- 漂浮光点（背景） -->
  <g fill="#ffffff" opacity="0.12">
    <circle cx="100" cy="420" r="3"/><circle cx="330" cy="400" r="2"/><circle cx="200" cy="440" r="2.5"/><circle cx="380" cy="430" r="2"/>
  </g>
  <!-- 中央炸裂大字 -->
  <g text-anchor="middle">
    <rect x="118" y="430" width="204" height="34" rx="17" fill="#f472b6" opacity="0.18"/>
    <text x="220" y="453" fill="#f9a8d4" font-size="15" font-weight="bold">🎉 又肝了一百字！</text>
  </g>
  <!-- 底部流动弹幕带 -->
  <rect x="34" y="500" width="372" height="44" rx="10" fill="#0f0f17" stroke="#2a2a3a"/>
  <text x="48" y="528" fill="#7c7c93" font-size="13">🚀 public class Demo { int x = 42; // 打字像流水 💧</text>

  <!-- 底部：倒计时圆环 + 按钮 -->
  <rect x="18" y="584" width="404" height="150" rx="12" fill="#2a2a3a" stroke="#34344a"/>
  <!-- 圆环 -->
  <g transform="translate(86,659)">
    <circle r="46" fill="none" stroke="#34344a" stroke-width="9"/>
    <circle r="46" fill="none" stroke="#22d3ee" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="289" stroke-dashoffset="96" transform="rotate(-90)"/>
    <circle cx="0" cy="-46" r="6" fill="#22d3ee"/>
    <text x="0" y="-4" fill="#e5e7eb" font-size="16" font-weight="bold" text-anchor="middle">12:34</text>
    <text x="0" y="16" fill="#9aa0b4" font-size="11" text-anchor="middle">下次休息</text>
  </g>
  <!-- 按钮 -->
  <g>
    <rect x="170" y="612" width="240" height="40" rx="10" fill="#22d3ee"/>
    <text x="290" y="638" fill="#06222a" font-size="14" font-weight="bold" text-anchor="middle">现在就去走走 🚶</text>
    <rect x="170" y="664" width="240" height="40" rx="10" fill="#3a3a4a"/>
    <text x="290" y="690" fill="#e5e7eb" font-size="14" font-weight="bold" text-anchor="middle">我再战一会儿 ⚔️</text>
  </g>

  <!-- 图例 -->
  <text x="220" y="748" fill="#5c5c73" font-size="10" text-anchor="middle">示意图 · 实际界面以运行效果为准</text>
</svg>
