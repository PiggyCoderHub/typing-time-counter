name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Gradle 8.12
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.12-bin.zip -o /tmp/gradle-8.12-bin.zip
          mkdir -p /opt/gradle
          unzip -q /tmp/gradle-8.12-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.12/bin" >> "$GITHUB_PATH"

      - name: Build IDEA plugin
        run: cd IDEA && gradle buildPlugin -x verifyPlugin

      - name: Build PyCharm plugin
        run: cd Pycharm && gradle buildPlugin -x verifyPlugin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zips
          path: "**/build/distributions/*.zip"
